packages:
  - "apps/*"
  - "packages/*"
  - "!apps/medusa/.medusa/**"

hoistPattern:
  - "*"
  # Keep storefront React 19 and Medusa Admin React 18 types isolated.
  - "!@types/react"
  - "!@types/react-dom"

allowBuilds:
  "@medusajs/telemetry": true
  "@sentry/cli": true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

# Catalogs centralize shared dependency versions.
# When a package depends on `react` it can reference `catalog:` instead of pinning the version twice.
catalog:
  # Storefront runtime — Medusa Admin pins React 18 in apps/medusa/package.json
  react: 19.2.6
  react-dom: 19.2.6
  "@types/react": 19.2.14
  "@types/react-dom": 19.2.3
  "@types/node": 24.12.3

  # Medusa — every @medusajs/* package must be locked to the same version
  "@medusajs/medusa": 2.14.2
  "@medusajs/framework": 2.14.2
  "@medusajs/types": 2.14.2
  "@medusajs/utils": 2.14.2
  "@medusajs/cli": 2.14.2
  "@medusajs/admin-vite-plugin": 2.14.2
  "@medusajs/admin-shared": 2.14.2
  "@medusajs/admin-sdk": 2.14.2
  "@medusajs/dashboard": 2.14.2
  "@medusajs/draft-order": 2.14.2
  "@medusajs/payment-stripe": 2.14.2
  "@medusajs/analytics-posthog": 2.14.2
  "@medusajs/loyalty-plugin": 2.14.2
  "@medusajs/js-sdk": 2.14.2

  # TypeScript toolchain shared across workspaces
  typescript: 6.0.3

patchedDependencies:
  "@medusajs/promotion@2.14.2": patches/@medusajs__promotion@2.14.2.patch

packageExtensions:
  "@alphabite/medusa-wishlist@0.5.9":
    dependencies:
      "@tanstack/react-query": 5.64.2
