name: Lighthouse

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: Vercel preview or production URL to audit
        required: true
        type: string

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PREVIEW_URL: ${{ inputs.url || github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: |
          pnpm --filter @vaivae/storefront exec lhci autorun \
            --collect.url="${PREVIEW_URL}/" \
            --collect.url="${PREVIEW_URL}/products" \
            --collect.url="${PREVIEW_URL}/capsule" \
            --collect.url="${PREVIEW_URL}/journal"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
